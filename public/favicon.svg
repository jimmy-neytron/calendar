<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Calendar tasks favicon">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151A2E"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>

    <linearGradient id="accent" x1="14" y1="15" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset=".55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- calendar body -->
    <rect x="12" y="14" width="40" height="40" rx="9" fill="#F8FAFC"/>

    <!-- calendar header -->
    <path d="M12 23C12 18.03 16.03 14 21 14H43C47.97 14 52 18.03 52 23V28H12V23Z" fill="url(#accent)"/>

    <!-- rings -->
    <path d="M22 10V19M42 10V19" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>

    <!-- small cells, simplified for favicon scale -->
    <rect x="17" y="33" width="7" height="7" rx="2" fill="#D7DCE7"/>
    <rect x="28.5" y="33" width="7" height="7" rx="2" fill="#D7DCE7"/>
    <rect x="40" y="33" width="7" height="7" rx="2" fill="#D7DCE7"/>
    <rect x="17" y="44" width="7" height="7" rx="2" fill="#D7DCE7"/>
    <rect x="40" y="44" width="7" height="7" rx="2" fill="#D7DCE7"/>

    <!-- task check -->
    <path d="M23 42L29 48L42 35" fill="none" stroke="url(#accent)" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
